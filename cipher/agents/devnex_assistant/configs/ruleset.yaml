# CIPHER DevNex Ruleset — F-009
# critical_globs: files that MUST exist in workspace_path before a full V-cycle run.
# The orchestrator's _enforce_critical_globs() method checks these before S1N1.

version: "1.0"

critical_globs:
  # Primary source component files
  - "**/*.c"
  - "**/*.h"
  # Linker artifacts (required by UC 4.4)
  - "**/*.ld"
  - "**/*.map"

# Files exempt from critical_glob enforcement (generated intermediates)
exempt_patterns:
  - "generated_artifacts/**"
  - "build/**"
  - ".venv/**"

# ASIL-gated operations — these trigger AsilGate evaluation
asil_gated_nodes:
  - S1N1   # LLD generation
  - S6N1   # VectorCAST test generation
  - S9N1   # Full traceability matrix
  - UC4_4  # Post-merge semantic check

# Maximum GCA retry attempts (F-002)
max_gca_retries: 3
