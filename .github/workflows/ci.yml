name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev] || pip install -e .
          pip install pytest pydantic fastapi httpx pyyaml

      - name: Run unit tests
        run: pytest tests/unit -q --tb=short

      - name: Compute CAP metrics on fixture CRC
        run: |
          python - <<'PY'
          from cipher.core.cap_metrics import compute_metrics
          # Smoke: ensure metrics module loads and runs with empty input.
          report = compute_metrics(crc_chains=[], gold_set=None)
          print("CAPMetricsReport:", report)
          PY

  vsix-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build extension
        working-directory: extension
        run: |
          npm install
          npm run build
      - name: Package .vsix
        working-directory: extension
        run: npx --yes @vscode/vsce package --no-yarn -o cipher-vscode.vsix
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cipher-vscode-vsix
          path: extension/cipher-vscode.vsix
