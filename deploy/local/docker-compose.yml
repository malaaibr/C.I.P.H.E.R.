###############################################################################
# CIPHER Local POC — Docker Compose Stack
#
# WBS Task: T-001
# ADR: ADR-0003
# Layer: DRS (Deployment & Runtime Substrate)
# Module Type: Driver
#
# Services: Redis 7, Memgraph, Qdrant, MinIO, NATS JetStream,
#           SQLite (host-file), OTel Collector, OPA
###############################################################################

services:
  # ─── Working Memory ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cipher-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── Knowledge Graph ────────────────────────────────────────────────────────
  memgraph:
    image: memgraph/memgraph:2.18.1
    container_name: cipher-memgraph
    ports:
      - "127.0.0.1:7687:7687"
      - "127.0.0.1:7444:7444"
    volumes:
      - memgraph_data:/var/lib/memgraph
    command: ["--also-log-to-stderr"]
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─── Vector Store ───────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.7
    container_name: cipher-qdrant
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── Artefact Object Store ──────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: cipher-minio
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - ./data/minio:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cipher}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-cipherdev123}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: cipher-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set cipher http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing cipher/cipher-artifacts;
      mc mb --ignore-existing cipher/cipher-checkpoints;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cipher}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-cipherdev123}

  # ─── Event Bus ──────────────────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: cipher-nats
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    command: -js -m 8222
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── Observability — OTel Collector ─────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: cipher-otel-collector
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    volumes:
      - ./otel-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config", "/etc/otelcol-contrib/config.yaml"]
    healthcheck:
      disable: true
    restart: unless-stopped

  # ─── Governance — OPA Sidecar ───────────────────────────────────────────────
  opa:
    image: openpolicyagent/opa:0.62.1
    container_name: cipher-opa
    ports:
      - "127.0.0.1:8181:8181"
    volumes:
      - ./policies:/policies:ro
    command: run --server --addr :8181 --diagnostic-addr :8282 /policies
    healthcheck:
      test: ["CMD", "/opa", "eval", "true"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  memgraph_data:
